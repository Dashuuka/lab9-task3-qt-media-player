name: Build all platforms

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

env:
  QT_VERSION: 6.7.3
  QT_WASM_VERSION: 6.7.3

jobs:
  linux:
    name: Linux (Desktop + tests)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build build-essential \
            libgl1-mesa-dev libxkbcommon-dev libfontconfig1 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 \
            libxcb-randr0 libxcb-render-util0 libxcb-shape0 libxcb-sync1 \
            libxcb-xfixes0 libxcb-xinerama0 libxcb-xkb1 libxkbcommon-x11-0 \
            xvfb

      - name: Install Qt (Linux desktop)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: qtshadertools qtmultimedia qt5compat
          cache: true

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR"

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests (unit + widget + integration)
        run: |
          cd build
          xvfb-run -a ctest --output-on-failure --verbose

      - name: Package
        run: |
          cd build
          tar -czf guessnumberx-linux-x64.tar.gz appGuessNumberX || true

      - uses: actions/upload-artifact@v4
        with:
          name: guessnumberx-linux
          path: |
            build/appGuessNumberX
            build/guessnumberx-linux-x64.tar.gz

  android:
    name: Android (APK)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install host Qt (Linux desktop, needed for cross-build)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: qtshadertools qtmultimedia
          cache: true

      - name: Save host Qt path
        run: |
          echo "QT_HOST_PATH=$QT_ROOT_DIR" >> $GITHUB_ENV
          echo "Captured host Qt: $QT_ROOT_DIR"

      - name: Install Android Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: linux
          target: android
          arch: android_arm64_v8a
          modules: qtshadertools qtmultimedia
          cache: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          yes | sdkmanager --install "ndk;26.1.10909125" "platforms;android-34" "build-tools;34.0.0"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Pin Android compile-SDK to 34
        # The runner has android-35/36 pre-installed; androiddeployqt picks
        # the latest, but Qt 6.7.3's bundled gradle plugin (AGP 7.4.1) is
        # only tested up to compileSdk = 34. Remove unsupported platforms
        # so the build uses android-34.
        run: |
          ls "$ANDROID_HOME/platforms/" || true
          sudo rm -rf "$ANDROID_HOME/platforms/android-35"* "$ANDROID_HOME/platforms/android-36"* || true
          echo "After cleanup:"
          ls "$ANDROID_HOME/platforms/"

      - name: Configure
        run: |
          echo "Target Qt:  $QT_ROOT_DIR"
          echo "Host Qt:    $QT_HOST_PATH"
          cmake -S . -B build-android \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR" \
            -DQT_HOST_PATH="$QT_HOST_PATH" \
            -DCMAKE_TOOLCHAIN_FILE="$QT_ROOT_DIR/lib/cmake/Qt6/qt.toolchain.cmake" \
            -DANDROID_NDK_ROOT="$ANDROID_NDK_ROOT" \
            -DANDROID_PLATFORM=android-23 \
            -DANDROID_ABI=arm64-v8a

      - name: Build
        run: cmake --build build-android --parallel

      - name: Build APK
        run: |
          cd build-android
          cmake --build . --target apk || true

      - uses: actions/upload-artifact@v4
        with:
          name: guessnumberx-android
          path: |
            build-android/android-build/build/outputs/apk/**/*.apk
            build-android/android-build/*.apk
          if-no-files-found: warn

  web:
    name: Web (WebAssembly)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Emscripten 3.1.50 (matches Qt 6.7.x)
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.50

      - name: Install host Qt (Linux desktop, matching WASM version)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_WASM_VERSION }}
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: qtshadertools qtmultimedia
          cache: true

      - name: Save host Qt path
        run: |
          echo "QT_HOST_PATH=$QT_ROOT_DIR" >> $GITHUB_ENV
          echo "Captured host Qt: $QT_ROOT_DIR"

      - name: Install Qt for WebAssembly
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_WASM_VERSION }}
          host: all_os
          target: wasm
          arch: wasm_singlethread
          modules: qtshadertools qtmultimedia
          cache: true

      - name: Show resolved Qt paths
        run: |
          echo "Target Qt (wasm):  $QT_ROOT_DIR"
          echo "Host Qt (desktop): $QT_HOST_PATH"
          ls "$QT_ROOT_DIR" || true
          ls "$QT_HOST_PATH" || true

      - name: Configure
        run: |
          cmake -S . -B build-wasm \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR" \
            -DQT_HOST_PATH="$QT_HOST_PATH" \
            -DCMAKE_TOOLCHAIN_FILE="$QT_ROOT_DIR/lib/cmake/Qt6/qt.toolchain.cmake"

      - name: Build
        run: cmake --build build-wasm --parallel

      - name: Stage Web bundle
        run: |
          mkdir -p site
          cp build-wasm/appGuessNumberX.js   site/ 2>/dev/null || true
          cp build-wasm/appGuessNumberX.wasm site/ 2>/dev/null || true
          cp build-wasm/appGuessNumberX.html site/index.html 2>/dev/null || true
          cp build-wasm/qtloader.js          site/ 2>/dev/null || true
          cp build-wasm/qtlogo.svg           site/ 2>/dev/null || true
          touch site/.nojekyll
          ls -la site/

      - uses: actions/upload-artifact@v4
        with:
          name: guessnumberx-web
          path: site/
          if-no-files-found: warn

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

  deploy-pages:
    name: Deploy Web to GitHub Pages
    needs: web
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

  ios:
    name: iOS (Device)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install host Qt (mac desktop)
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: desktop
          arch: clang_64
          modules: qtshadertools qtmultimedia
          cache: true

      - name: Save host Qt path
        run: echo "QT_HOST_PATH=$QT_ROOT_DIR" >> $GITHUB_ENV

      - name: Install iOS Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          host: mac
          target: ios
          modules: qtshadertools qtmultimedia
          cache: true

      - name: Configure
        run: |
          echo "Target Qt:  $QT_ROOT_DIR"
          echo "Host Qt:    $QT_HOST_PATH"
          cmake -S . -B build-ios -G Xcode \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$QT_ROOT_DIR" \
            -DQT_HOST_PATH="$QT_HOST_PATH" \
            -DCMAKE_TOOLCHAIN_FILE="$QT_ROOT_DIR/lib/cmake/Qt6/qt.toolchain.cmake" \
            -DCMAKE_OSX_ARCHITECTURES="arm64" \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGN_IDENTITY=""

      - name: Build
        run: |
          cmake --build build-ios --config Release --parallel -- \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

      - uses: actions/upload-artifact@v4
        with:
          name: guessnumberx-ios
          path: |
            build-ios/Release-iphoneos/*.app
            build-ios/**/*.app
          if-no-files-found: warn
