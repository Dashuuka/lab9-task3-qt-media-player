name: task3_qt_media_player CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  windows-desktop:
    name: Windows Desktop build and tests
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.3'
          arch: 'win64_msvc2022_64'
          modules: 'qtmultimedia qtshadertools'
          cache: true

      - name: Print tool versions
        shell: cmd
        run: |
          where cl
          cl
          where cmake
          cmake --version
          where qt-cmake
          qt-cmake --version

      - name: Configure
        shell: cmd
        run: |
          qt-cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl

      - name: Build
        shell: cmd
        run: |
          cmake --build build --config Release

      - name: List CTest tests
        shell: cmd
        run: |
          ctest --test-dir build -N -C Release

      - name: Run C++/Qt and QML tests
        shell: cmd
        run: |
          ctest --test-dir build --output-on-failure -C Release

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: task3-qt-windows-desktop
          path: |
            build/**/*.exe
            build/**/*.dll
            build/**/*.qml
          if-no-files-found: ignore

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: task3-qt-test-logs
          path: build/Testing/**
          if-no-files-found: ignore

  webassembly-placeholder:
    name: Qt WebAssembly placeholder
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: WebAssembly note
        run: |
          echo "Qt WebAssembly build requires a Qt Wasm kit and Emscripten."
          echo "Install Qt with wasm_32 target and configure with the generated qt-cmake toolchain."

  android-placeholder:
    name: Qt Android placeholder
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Android note
        run: |
          echo "Qt Android build requires Android SDK/NDK plus a matching Qt Android kit."
          echo "The Windows Desktop job is the primary working CI build for this project."
